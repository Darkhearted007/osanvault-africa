worker_processes 1;
events { worker_connections 1024; }
http {
    server {
        listen 8080;
        server_name osanvaultafrica.com www.osanvaultafrica.com;
        root /data/data/com.termux/files/home/www/osanvault-africa;
        index index.html index.htm index.php;
        location / { try_files $uri $uri/ =404; }
        location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    }

    server {
        listen 8443 ssl http2;
        server_name osanvaultafrica.com www.osanvaultafrica.com;
        root /data/data/com.termux/files/home/www/osanvault-africa;
        index index.html index.htm index.php;
        ssl_certificate /data/data/com.termux/files/home/www/ssl/config/live/osanvaultafrica.com/fullchain.pem;
        ssl_certificate_key /data/data/com.termux/files/home/www/ssl/config/live/osanvaultafrica.com/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
    }
}
